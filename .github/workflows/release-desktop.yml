name: Release EleMate Desktop

on:
  workflow_dispatch:
    inputs:
      arch:
        description: "Build target architecture"
        required: false
        default: "both"
        type: choice
        options:
          - both
          - arm64
          - x64
      notarize:
        description: "Run Apple notarization"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-14
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        arch: ${{ fromJSON(github.event_name == 'workflow_dispatch' && github.event.inputs.arch == 'arm64' && '["arm64"]' || github.event_name == 'workflow_dispatch' && github.event.inputs.arch == 'x64' && '["x64"]' || '["arm64","x64"]') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Cache standalone Python archive
        uses: actions/cache@v4
        with:
          path: .cache/python-runtime
          key: python-standalone-${{ runner.os }}-${{ matrix.arch }}-${{ hashFiles('scripts/fetch_elemate_python_runtime.mjs') }}

      - name: Install dependencies
        run: npm ci

      - name: Build web
        run: npm run build:web

      - name: Prepare desktop runtime
        run: npm run prepare:desktop-runtime

      - name: Prepare bundled Python runtime
        run: npm run prepare:desktop-python:${{ matrix.arch }}

      - name: Configure macOS code signing
        shell: bash
        env:
          MACOS_CERT_P12_BASE64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
        run: |
          if [ -z "${MACOS_CERT_P12_BASE64:-}" ] || [ -z "${MACOS_CERT_PASSWORD:-}" ]; then
            echo "Skipping code signing setup: certificate secrets are not configured."
            exit 0
          fi

          CERT_PATH="$RUNNER_TEMP/elemate-signing.p12"
          echo "$MACOS_CERT_P12_BASE64" | base64 --decode > "$CERT_PATH"
          echo "CSC_LINK=file://$CERT_PATH" >> "$GITHUB_ENV"
          echo "CSC_KEY_PASSWORD=$MACOS_CERT_PASSWORD" >> "$GITHUB_ENV"

      - name: Build desktop artifacts
        run: npm --workspace apps/desktop run dist:mac:${{ matrix.arch }}
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          ELEMATE_NOTARIZE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.notarize || 'true' }}
          DEBUG: electron-builder*

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: elemate-desktop-${{ matrix.arch }}
          path: |
            apps/desktop/dist/*.dmg
            apps/desktop/dist/*.zip

      - name: Publish to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            apps/desktop/dist/*.dmg
            apps/desktop/dist/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
