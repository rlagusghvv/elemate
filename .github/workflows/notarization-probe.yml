name: Notarization probe

on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Configure signing and notary credentials
        env:
          MACOS_CERT_P12_BASE64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          if [ -z "${MACOS_CERT_P12_BASE64:-}" ] || [ -z "${MACOS_CERT_PASSWORD:-}" ] || [ -z "${APPLE_ID:-}" ] || [ -z "${APPLE_APP_SPECIFIC_PASSWORD:-}" ] || [ -z "${APPLE_TEAM_ID:-}" ]; then
            echo "Missing required signing/notary secrets."
            exit 1
          fi

          CERT_PATH="$RUNNER_TEMP/developer-id.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/notary-probe.keychain-db"
          KEYCHAIN_PASSWORD="notary-probe"

          echo "$MACOS_CERT_P12_BASE64" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "$MACOS_CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/xcrun -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          LOGIN_KEYCHAIN="$HOME/Library/Keychains/login.keychain-db"
          security list-keychains -d user -s "$KEYCHAIN_PATH" "$LOGIN_KEYCHAIN"
          security default-keychain -d user -s "$KEYCHAIN_PATH"

          xcrun notarytool store-credentials elemate-notary \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --keychain "$KEYCHAIN_PATH" \
            --no-validate

          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | awk -F'"' '/Developer ID Application:/ {print $2; exit}')
          if [ -z "$IDENTITY" ]; then
            echo "Developer ID Application identity not found."
            security find-identity -v -p codesigning "$KEYCHAIN_PATH"
            exit 1
          fi

          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
          echo "IDENTITY=$IDENTITY" >> "$GITHUB_ENV"

      - name: Build tiny probe app
        run: |
          set -euo pipefail
          mkdir -p probe/Probe.app/Contents/MacOS
          cat > probe/probe.c <<'C'
          #include <stdio.h>
          int main(void) {
            puts("EleMate notarization probe");
            return 0;
          }
          C
          clang probe/probe.c -o probe/Probe.app/Contents/MacOS/Probe
          cat > probe/Probe.app/Contents/Info.plist <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key>
            <string>Probe</string>
            <key>CFBundleIdentifier</key>
            <string>ai.elemate.notaryprobe</string>
            <key>CFBundleName</key>
            <string>Probe</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleShortVersionString</key>
            <string>1.0</string>
            <key>CFBundleVersion</key>
            <string>1</string>
            <key>LSMinimumSystemVersion</key>
            <string>13.0</string>
          </dict>
          </plist>
          PLIST
          /usr/bin/codesign --force --sign "$IDENTITY" --options runtime --timestamp --deep --verbose probe/Probe.app
          /usr/bin/codesign --verify --deep --strict --verbose=2 probe/Probe.app
          /usr/bin/ditto -c -k --keepParent --sequesterRsrc probe/Probe.app probe/Probe.zip
          ls -lh probe/Probe.zip

      - name: Submit and poll notarization
        run: |
          set -euo pipefail
          xcrun notarytool submit probe/Probe.zip \
            --keychain-profile elemate-notary \
            --keychain "$KEYCHAIN_PATH" \
            --output-format json \
            --no-wait > probe-submission.json

          python3 - <<'PY'
          import json
          with open("probe-submission.json", "r", encoding="utf-8") as fh:
              payload = json.load(fh)
          print(payload)
          print(payload["id"])
          PY

          SUBMISSION_ID=$(python3 - <<'PY'
          import json
          with open("probe-submission.json", "r", encoding="utf-8") as fh:
              print(json.load(fh)["id"])
          PY
          )
          echo "SUBMISSION_ID=$SUBMISSION_ID" >> "$GITHUB_ENV"

          DEADLINE=$(( $(date +%s) + 1200 ))
          while [ "$(date +%s)" -lt "$DEADLINE" ]; do
            xcrun notarytool info "$SUBMISSION_ID" \
              --keychain-profile elemate-notary \
              --keychain "$KEYCHAIN_PATH" \
              --output-format json > probe-status.json

            STATUS=$(python3 - <<'PY'
          import json
          with open("probe-status.json", "r", encoding="utf-8") as fh:
              print(str(json.load(fh).get("status", "")).strip())
          PY
            )

            echo "Probe notarization status ($SUBMISSION_ID): $STATUS"
            if [ "$STATUS" = "Accepted" ]; then
              exit 0
            fi
            if [ "$STATUS" = "Invalid" ] || [ "$STATUS" = "Rejected" ]; then
              xcrun notarytool log "$SUBMISSION_ID" probe-log.json \
                --keychain-profile elemate-notary \
                --keychain "$KEYCHAIN_PATH"
              cat probe-log.json
              exit 1
            fi
            sleep 30
          done

          echo "Probe notarization stayed In Progress for 20 minutes."
          exit 1

      - name: Upload probe artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: notarization-probe
          if-no-files-found: ignore
          path: |
            probe-submission.json
            probe-status.json
            probe-log.json
